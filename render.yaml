services:
  - type: web
    name: tg-rtmp-multibot
    runtime: python
    buildCommand: >-
      pip install -r requirements.txt &&
      curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
      | tar xJ --wildcards --strip-components=1 -C /usr/local/bin '*/ffmpeg'
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: MAX_STREAMS
        value: "2"
      - key: DB_PATH
        value: bot.db
